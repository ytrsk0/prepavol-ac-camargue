name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Type Check / Lint
        run: npm run lint

      - name: Build Project
        run: npm run build

  # =========================================================
  # Example: Deploying to Google Cloud Run via Docker
  # (Uncomment and configure if deploying to GCP)
  # =========================================================
  deploy-cloud-run:
    name: Deploy to Cloud Run
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    env:
      PROJECT_ID: able-cogency-278718
      SERVICE_NAME: prepavol-suite
      REGION: europe-west9

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Using Workload Identity Federation (Recommended)
          workload_identity_provider: "projects/1068613960760/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@able-cogency-278718.iam.gserviceaccount.com"
          # OR using JSON credentials:
          # credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="europe-west9-docker.pkg.dev/${{ env.PROJECT_ID }}/prepavol-ac-camargue/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: europe-west9-docker.pkg.dev/${{ env.PROJECT_ID }}/prepavol-ac-camargue/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: "--port=3000 --allow-unauthenticated"
